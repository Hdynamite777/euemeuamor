<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            user-select: none;
        }
        .container:active {
            transform: scale(0.98);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .hint {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
            font-style: italic;
        }
        .hidden {
            display: none;
        }
        .main-content {
            display: none;
            text-align: center;
            color: white;
        }
        .main-content.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Tela de boas-vindas -->
    <div id="welcomeScreen" class="container">
        <h1>Bem-vindo! 👋</h1>
        <p>Seu projeto está pronto para começar.</p>
        <div class="hint" id="hint">
            <span id="mobileTip">Toque na tela para continuar</span>
            <span id="desktopTip"> | Pressione ESC para sair</span>
        </div>
    </div>

    <!-- Conteúdo principal (após sair da tela de boas-vindas) -->
    <div id="mainContent" class="main-content">
        <h1>Conteúdo Principal</h1>
        <p>Você saiu da tela de boas-vindas!</p>
    </div>

    <script>
        // Detectar se é mobile ou desktop
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        };

        // Atualizar dica de acordo com o dispositivo
        const mobileTip = document.getElementById('mobileTip');
        const desktopTip = document.getElementById('desktopTip');
        
        if (isMobileDevice()) {
            desktopTip.style.display = 'none';
        } else {
            mobileTip.style.display = 'none';
        }

        // Função para sair da tela de boas-vindas
        const exitWelcome = () => {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const mainContent = document.getElementById('mainContent');
            
            welcomeScreen.classList.add('hidden');
            mainContent.classList.add('show');
        };

        // Evento de toque (mobile)
        document.addEventListener('touchstart', (event) => {
            const welcomeScreen = document.getElementById('welcomeScreen');
            if (!welcomeScreen.classList.contains('hidden')) {
                exitWelcome();
            }
        });

        // Evento de teclado (ESC)
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                exitWelcome();
            }
        });

        // Evento de clique (alternativo para desktop)
        document.getElementById('welcomeScreen').addEventListener('click', (event) => {
            exitWelcome();
        });
    </script>
</body>
</html>
