<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Com Amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        /* Estrelas do espaço */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            user-select: none;
            z-index: 10;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .container:active {
            transform: scale(0.98);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 3em;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
        }

        p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.6);
        }

        .hint {
            color: #aaa;
            font-size: 12px;
            margin-top: 20px;
            font-style: italic;
        }

        .hidden {
            display: none;
        }

        .main-content {
            display: none;
            text-align: center;
            color: white;
            z-index: 10;
            position: relative;
        }

        .main-content.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Fundo com estrelas -->
    <div class="stars" id="starsContainer"></div>

    <!-- Tela de boas-vindas -->
    <div id="welcomeScreen" class="container">
        <h1>Com Amor 💕</h1>
        <p>De H para: N &lt;3</p>
        <div class="hint" id="hint">
            <span id="mobileTip">Toque na tela para continuar</span>
            <span id="desktopTip"> | Pressione ESC para sair</span>
        </div>
    </div>

    <!-- Conteúdo principal (após sair da tela de boas-vindas) -->
    <div id="mainContent" class="main-content">
        <h1>Conteúdo Principal</h1>
        <p>Você saiu da tela de boas-vindas!</p>
    </div>

    <script>
        // Criar estrelas no fundo
        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 3 + 0.5;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 2 + 2;

                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = x + '%';
                star.style.top = y + '%';
                star.style.animationDuration = duration + 's';
                star.style.animationDelay = Math.random() * 3 + 's';

                starsContainer.appendChild(star);
            }
        }

        createStars();

        // Detectar se é mobile ou desktop
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        };

        // Atualizar dica de acordo com o dispositivo
        const mobileTip = document.getElementById('mobileTip');
        const desktopTip = document.getElementById('desktopTip');
        
        if (isMobileDevice()) {
            desktopTip.style.display = 'none';
        } else {
            mobileTip.style.display = 'none';
        }

        // Função para sair da tela de boas-vindas
        const exitWelcome = () => {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const mainContent = document.getElementById('mainContent');
            
            welcomeScreen.classList.add('hidden');
            mainContent.classList.add('show');
        };

        // Evento de toque (mobile)
        document.addEventListener('touchstart', (event) => {
            const welcomeScreen = document.getElementById('welcomeScreen');
            if (!welcomeScreen.classList.contains('hidden')) {
                exitWelcome();
            }
        });

        // Evento de teclado (ESC)
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                exitWelcome();
            }
        });

        // Evento de clique (alternativo para desktop)
        document.getElementById('welcomeScreen').addEventListener('click', (event) => {
            exitWelcome();
        });
    </script>
</body>
</html>
